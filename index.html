<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Voice Kirby Adventure</title>
    <style>
        body { margin: 0; overflow: hidden; background: #000; font-family: 'Segoe UI', sans-serif; }
        canvas { display: block; }
        
        #ui-layer, #death-screen, #win-screen {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            display: flex; justify-content: center; align-items: center;
            flex-direction: column; z-index: 10;
        }

        #death-screen, #win-screen { display: none; }

        #death-screen {
            background: rgba(180, 0, 0, 0.5);
            backdrop-filter: blur(15px); /* Blur leggermente aumentato */
            color: white;
        }

        #win-screen {
            background: rgba(0,0,0,0.4);
            backdrop-filter: blur(15px);
            color: white;
            animation: oscillate 3s infinite ease-in-out;
        }

        @keyframes oscillate {
            0%, 100% { transform: translateX(-30px); }
            50% { transform: translateX(30px); }
        }

        .btn {
            padding: 20px 40px; font-size: 24px; cursor: pointer;
            background: #ffcc00; border: 2px solid #000; border-radius: 10px;
            box-shadow: 0 5px #000; font-weight: bold; color: black;
            text-transform: uppercase; margin-top: 20px;
        }

        .hint { font-size: 60px; margin-top: 20px; }
    </style>
</head>
<body>

    <div id="ui-layer">
        <button id="start-btn" class="btn">INIZIA GIOCO</button>
    </div>

    <div id="death-screen">
        <h1 style="font-size: 70px; margin: 0; text-shadow: 3px 3px #000;">HAI PERSO</h1>
        <button id="retry-btn" class="btn">RIPROVA</button>
    </div>

    <div id="win-screen">
        <h1 style="font-size: 80px; margin: 0; text-shadow: 4px 4px #000;">HAI VINTO!</h1>
        <div class="hint">INDIZIO: 🗣️🦁</div>
    </div>

    <audio id="bg-audio" loop>
        <source src="https://raw.githubusercontent.com/TheFisp/GAME-1/main/Kirby%20Theme.mp3" type="audio/mpeg">
    </audio>

    <canvas id="gameCanvas"></canvas>

    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.5.1/dist/confetti.browser.min.js"></script>
    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const startBtn = document.getElementById('start-btn');
        const retryBtn = document.getElementById('retry-btn');
        const uiLayer = document.getElementById('ui-layer');
        const deathScreen = document.getElementById('death-screen');
        const winScreen = document.getElementById('win-screen');
        const bgAudio = document.getElementById('bg-audio');

        const imgBg = new Image(); imgBg.src = 'https://raw.githubusercontent.com/TheFisp/GAME-1/main/37akav2gc6fe1.jpeg';
        const imgPlayer = new Image(); imgPlayer.src = 'https://raw.githubusercontent.com/TheFisp/GAME-1/main/kirby.png';
        const imgTrophy = new Image(); imgTrophy.src = 'https://raw.githubusercontent.com/TheFisp/GAME-1/main/75846-trophy-cup-icon-free-download-image.png';

        let audioContext, analyser, dataArray;
        let gameRunning = false;
        let pipes = [];
        let trophy = null;
        let playerY = window.innerHeight / 2;
        let targetY = window.innerHeight / 2;
        const playerX = 150;
        const playerSize = 90;
        let spawnTimeouts = [];

        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;

        class Pipe {
            constructor(x) {
                this.x = x;
                this.width = 90;
                this.gap = 750;
                this.topHeight = Math.random() * (canvas.height - this.gap - 200) + 100;
            }
            draw() {
                ctx.fillStyle = "#2ecc71";
                ctx.strokeStyle = "#000";
                ctx.lineWidth = 1.5;
                ctx.fillRect(this.x, 0, this.width, this.topHeight);
                ctx.strokeRect(this.x, 0, this.width, this.topHeight);
                ctx.fillRect(this.x, this.topHeight + this.gap, this.width, canvas.height);
                ctx.strokeRect(this.x, this.topHeight + this.gap, this.width, canvas.height);
            }
            update() { this.x -= 7; }
        }

        async function initAudio() {
            if (audioContext) return; 
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                audioContext = new (window.AudioContext || window.webkitAudioContext)();
                analyser = audioContext.createAnalyser();
                const source = audioContext.createMediaStreamSource(stream);
                source.connect(analyser);
                analyser.fftSize = 256;
                dataArray = new Uint8Array(analyser.frequencyBinCount);
            } catch (err) { alert("Accesso al microfono negato!"); }
        }

        // Torna alla schermata iniziale
        function backToStart() {
            spawnTimeouts.forEach(t => clearTimeout(t));
            spawnTimeouts = [];
            pipes = [];
            trophy = null;
            gameRunning = false;
            
            // Ripulisci il canvas e mostra il menù
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            ctx.drawImage(imgBg, 0, 0, canvas.width, canvas.height);
            
            deathScreen.style.display = 'none';
            winScreen.style.display = 'none';
            uiLayer.style.display = 'flex';
            
            bgAudio.pause();
            bgAudio.currentTime = 0;
        }

        function startGame() {
            uiLayer.style.display = 'none';
            playerY = canvas.height / 2;
            gameRunning = true;
            bgAudio.play();
            spawnTimeline();
            gameLoop();
        }

        function spawnTimeline() {
            let startX = canvas.width + 500;
            let t1 = setTimeout(() => {
                if(!gameRunning) return;
                for(let i=0; i<10; i++) {
                    pipes.push(new Pipe(startX + (i * 1200)));
                }
                
                let t2 = setTimeout(() => {
                    if(!gameRunning) return;
                    let lastX = pipes.length > 0 ? pipes[pipes.length-1].x : startX;
                    for(let j=1; j<=3; j++) {
                        pipes.push(new Pipe(lastX + 1500 + (j * 450)));
                    }
                    
                    trophy = { 
                        x: lastX + 3800, 
                        y: canvas.height/2 - 150, 
                        w: 300, 
                        h: 300 
                    };
                }, 8000);
                spawnTimeouts.push(t2);
            }, 5000);
            spawnTimeouts.push(t1);
        }

        function gameOver() {
            gameRunning = false;
            deathScreen.style.display = 'flex';
            bgAudio.pause();
        }

        function win() {
            gameRunning = false;
            winScreen.style.display = 'flex';
            confetti({ particleCount: 200, spread: 90, origin: { y: 0.6 } });
        }

        function gameLoop() {
            if(!gameRunning) return;
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            ctx.drawImage(imgBg, 0, 0, canvas.width, canvas.height);

            if (analyser) {
                analyser.getByteFrequencyData(dataArray);
                let sum = 0;
                for(let i=0; i<dataArray.length; i++) sum += dataArray[i];
                let volume = sum / dataArray.length;
                let sensitivity = canvas.height / 75;
                targetY = canvas.height - (volume * sensitivity) - playerSize;
            }
            
            targetY = Math.max(20, Math.min(canvas.height - playerSize - 20, targetY));
            playerY += (targetY - playerY) * 0.15; 

            ctx.save();
            ctx.shadowColor = "black";
            ctx.shadowBlur = 1.5; 
            ctx.drawImage(imgPlayer, playerX, playerY, playerSize, playerSize);
            ctx.restore();

            pipes.forEach((p) => {
                p.update();
                p.draw();
                if (playerX + playerSize - 15 > p.x && playerX + 15 < p.x + p.width) {
                    if (playerY + 15 < p.topHeight || playerY + playerSize - 15 > p.topHeight + p.gap) {
                        gameOver();
                    }
                }
            });

            if(trophy) {
                trophy.x -= 7;
                ctx.save();
                ctx.shadowBlur = 60;
                ctx.shadowColor = "yellow";
                ctx.drawImage(imgTrophy, trophy.x, trophy.y, trophy.w, trophy.h);
                ctx.restore();

                if(playerX + playerSize > trophy.x + 50 && playerX < trophy.x + trophy.w) {
                    win();
                }
            }

            requestAnimationFrame(gameLoop);
        }

        startBtn.addEventListener('click', async () => {
            await initAudio();
            startGame();
        });

        retryBtn.addEventListener('click', () => {
            backToStart();
        });

        // Inizializzazione sfondo
        imgBg.onload = () => {
            ctx.drawImage(imgBg, 0, 0, canvas.width, canvas.height);
        };
    </script>
</body>
</html>
